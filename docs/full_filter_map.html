    <style>
        * { margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .control-group { background: white; padding: 8px 12px; border-radius: 5px; border: 1px solid #ddd; }
        select { padding: 5px; border-radius: 5px; cursor: pointer; }
        button { background: #764ba2; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .stats { background: #667eea; color: white; padding: 8px 15px; border-radius: 5px; }
        .range-slider { width: 260px; display: flex; gap: 10px; align-items: center; }
        input { width: 100px; }
    </style>
</head>

    <div id="map"></div>
    <div class="controls">

        const map = L.map("map").setView([50, 15], 4);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);
        
        // Заполняем списки стран
        const fromSelect = document.getElementById("countryFrom");
        const toSelect = document.getElementById("countryTo");
        
        const allFrom = [...new Set(routesData.map(r => r.country_from))].sort();
        const allTo = [...new Set(routesData.map(r => r.country_to))].sort();
        
        allFrom.forEach(c => { const opt = document.createElement("option"); opt.value = c; opt.text = c; fromSelect.appendChild(opt); });
        allTo.forEach(c => { const opt = document.createElement("option"); opt.value = c; opt.text = c; toSelect.appendChild(opt); });
        
        let lines = [], markers = [], showMarkers = true;
        
        function getColor(count) {
            if (count == 1) return "#FFD700";
            if (count == 2) return "#FFA500";
            if (count == 3) return "#FF6347";
            return "#FF0000";
        }
        
        function updateMap() {
            // Удаляем старые слои
            lines.forEach(l => map.removeLayer(l));
            markers.forEach(m => map.removeLayer(m));
            lines = [];
            markers = [];
            
            // Получаем фильтры
            const minYear = parseInt(document.getElementById("minYear").value);
            const maxYear = parseInt(document.getElementById("maxYear").value);
            const countryFrom = document.getElementById("countryFrom").value;
            const countryTo = document.getElementById("countryTo").value;
            
            // Фильтруем
            let filtered = routesData.filter(r => r.decade >= minYear && r.decade <= maxYear);
            if (countryFrom !== "all") filtered = filtered.filter(r => r.country_from === countryFrom);
            if (countryTo !== "all") filtered = filtered.filter(r => r.country_to === countryTo);
            
            // Счётчик
            const total = filtered.reduce((s, r) => s + r.count, 0);
            document.getElementById("postcardCount").innerText = total;
            
            // Рисуем линии
            filtered.forEach(route => {
                const line = L.polyline(
                    [[route.lat_from, route.lon_from], [route.lat_to, route.lon_to]],
                    { color: getColor(route.count), weight: Math.min(route.count * 2, 12), opacity: 0.7 }
                ).bindPopup(`${route.country_from} → ${route.country_to}<br>📬 ${route.count} открыток<br>📅 ${route.decade}-е годы`);
                line.addTo(map);
                lines.push(line);
            });
            
            // Рисуем маркеры (если включены)
            if (showMarkers && filtered.length > 0) {
                const stats = {};
                filtered.forEach(r => { stats[r.country_from] = (stats[r.country_from] || 0) + r.count; });
                Object.keys(stats).forEach(c => {
                    const r = filtered.find(r => r.country_from === c);
                    if (r) {
                        const marker = L.circleMarker([r.lat_from, r.lon_from], {
                            radius: Math.sqrt(stats[c]) * 2,
                            color: "#4A90E2",
                            fillOpacity: 0.6
                        }).bindPopup(`${c}<br>📬 Отправлено: ${stats[c]}`);
                        marker.addTo(map);
                        markers.push(marker);
                    }
                });
            }
        }
        
        // События
        document.getElementById("minYear").addEventListener("input", updateMap);
        document.getElementById("maxYear").addEventListener("input", updateMap);
        document.getElementById("countryFrom").addEventListener("change", updateMap);
        document.getElementById("countryTo").addEventListener("change", updateMap);
        
        document.getElementById("toggleMarkers").addEventListener("click", () => {
            showMarkers = !showMarkers;
            document.getElementById("toggleMarkers").innerText = showMarkers ? "Скрыть маркеры" : "Показать маркеры";
            updateMap();
        });
        
        document.getElementById("resetBtn").addEventListener("click", () => {
            document.getElementById("countryFrom").value = "all";
            document.getElementById("countryTo").value = "all";
            document.getElementById("minYear").value = "1890";
            document.getElementById("maxYear").value = "2020";
            updateMap();
        });
        
        // Запуск
        updateMap();
    </script>
