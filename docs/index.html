    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * { margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .control-group {
            background: white;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .control-group label {
            font-weight: bold;
            margin-right: 10px;
        }
        input[type="range"] { width: 120px; cursor: pointer; }
        select { padding: 5px; border-radius: 5px; cursor: pointer; }
        .stats {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
        }
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        @media (max-width: 800px) {
            .controls { flex-direction: column; align-items: stretch; }
            input[type="range"] { width: 100%; }
        }
    </style>
</head>

        <div class="control-group">

        const map = L.map("map").setView([50, 15], 4);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);
        
        // Получаем уникальные страны
        const allFromCountries = [...new Set(routesData.map(r => r.country_from))].sort();
        const allToCountries = [...new Set(routesData.map(r => r.country_to))].sort();
        
        const fromSelect = document.getElementById("countryFrom");
        const toSelect = document.getElementById("countryTo");
        
        allFromCountries.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c;
            opt.text = c;
            fromSelect.appendChild(opt);
        });
        
        allToCountries.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c;
            opt.text = c;
            toSelect.appendChild(opt);
        });
        
        let layers = [];
        let markers = [];
        
        function getLineColor(count) {
            if (count == 1) return "#FFD700";
            if (count == 2) return "#FFA500";
            if (count == 3) return "#FF6347";
            return "#FF0000";
        }
        
        function updateMap() {
            layers.forEach(l => map.removeLayer(l));
            markers.forEach(m => map.removeLayer(m));
            layers = [];
            markers = [];
            
            const minD = parseInt(document.getElementById("decadeMin").value);
            const maxD = parseInt(document.getElementById("decadeMax").value);
            const countryFrom = document.getElementById("countryFrom").value;
            const countryTo = document.getElementById("countryTo").value;
            
            document.getElementById("minVal").innerText = minD;
            document.getElementById("maxVal").innerText = maxD;
            
            let filtered = routesData.filter(r => r.decade >= minD && r.decade <= maxD);
            
            if (countryFrom !== "all") {
                filtered = filtered.filter(r => r.country_from === countryFrom);
            }
            if (countryTo !== "all") {
                filtered = filtered.filter(r => r.country_to === countryTo);
            }
            
            const total = filtered.reduce((s, r) => s + r.count, 0);
            document.getElementById("postcardCount").innerText = total;
            
            // Рисуем линии
            filtered.forEach(route => {
                const line = L.polyline(
                    [[route.lat_from, route.lon_from], [route.lat_to, route.lon_to]],
                    { 
                        color: getLineColor(route.count), 
                        weight: Math.min(route.count * 2, 12), 
                        opacity: 0.7 
                    }
                ).bindPopup(`
                    <b>${route.country_from} → ${route.country_to}</b><br>
                    📬 ${route.count} открыток<br>
                    📅 ${route.decade}-е годы<br>
                    🗓️ Годы: ${route.years || route.decade}
                `);
                line.addTo(map);
                layers.push(line);
            });
            
            // Маркеры стран отправления
            const fromStats = {};
            filtered.forEach(route => {
                fromStats[route.country_from] = (fromStats[route.country_from] || 0) + route.count;
            });
            
            Object.keys(fromStats).forEach(c => {
                const route = filtered.find(r => r.country_from === c);
                if (route) {
                    const marker = L.circleMarker([route.lat_from, route.lon_from], {
                        radius: Math.sqrt(fromStats[c]) * 2,
                        color: "#4A90E2",
                        fillOpacity: 0.6,
                        weight: 2
                    }).bindPopup(`
                        <b>✈️ ${c}</b><br>
                        📬 Отправлено: ${fromStats[c]} открыток
                    `);
                    marker.addTo(map);
                    markers.push(marker);
                }
            });
            
            // Маркеры стран назначения
            const toStats = {};
            filtered.forEach(route => {
                toStats[route.country_to] = (toStats[route.country_to] || 0) + route.count;
            });
            
            Object.keys(toStats).forEach(c => {
                const route = filtered.find(r => r.country_to === c);
                if (route && !fromStats[c]) {
                    const marker = L.circleMarker([route.lat_to, route.lon_to], {
                        radius: Math.sqrt(toStats[c]) * 2,
                        color: "#2ECC71",
                        fillOpacity: 0.6,
                        weight: 2
                    }).bindPopup(`
                        <b>🎯 ${c}</b><br>
                        📬 Получено: ${toStats[c]} открыток
                    `);
                    marker.addTo(map);
                    markers.push(marker);
                }
            });
        }
        
        // Синхронизация слайдеров
        const minSlider = document.getElementById("decadeMin");
        const maxSlider = document.getElementById("decadeMax");
        
        function syncMin() {
            let min = parseInt(minSlider.value);
            let max = parseInt(maxSlider.value);
            if (min > max) maxSlider.value = min;
            updateMap();
        }
        
        function syncMax() {
            let min = parseInt(minSlider.value);
            let max = parseInt(maxSlider.value);
            if (max < min) minSlider.value = max;
            updateMap();
        }
        
        minSlider.addEventListener("input", syncMin);
        maxSlider.addEventListener("input", syncMax);
        document.getElementById("countryFrom").addEventListener("change", updateMap);
        document.getElementById("countryTo").addEventListener("change", updateMap);
        
        document.getElementById("resetBtn").addEventListener("click", () => map.setView([50, 15], 4));
        document.getElementById("resetFiltersBtn").addEventListener("click", () => {
            document.getElementById("countryFrom").value = "all";
            document.getElementById("countryTo").value = "all";
            minSlider.value = "1890";
            maxSlider.value = "2020";
            updateMap();
        });
        
        updateMap();
    </script>
