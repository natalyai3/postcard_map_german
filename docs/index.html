<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Карта почтовых открыток</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([50, 15], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
        
        L.marker([48.8566, 2.3522]).addTo(map)
            .bindPopup('Франция');
        L.marker([50.0755, 14.4378]).addTo(map)
            .bindPopup('Чехия');
        L.marker([55.7558, 37.6173]).addTo(map)
            .bindPopup('Россия');
        
        var latlngs = [
            [[48.8566, 2.3522], [50.0755, 14.4378]],
            [[48.8566, 2.3522], [55.7558, 37.6173]]
        ];
        
        latlngs.forEach(function(points) {
            L.polyline(points, {color: 'red', weight: 3}).addTo(map);
        });
    </script>
</body>
</html>
